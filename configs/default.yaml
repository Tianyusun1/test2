# File: tianyusun1/test2/test2-2.0/configs/default.yaml (CRITICAL LOSS WEIGHT MODIFICATION)

model:
  # BERT encoder
  bert_path: "/home/610-sty/huggingface/bert-base-chinese"
  hidden_size: 768
  # Layout decoder
  bb_size: 64
  decoder_layers: 6
  decoder_heads: 8
  dropout: 0.3
  # Output
  num_classes: 9
  
  # --- DISCRETE BBOX PARAMETERS (NEW) ---
  num_bbox_bins: 1000
  cls_embed_dim: 16
  bbox_embed_dim: 12
  iou_loss_weight: 10.0     # <<< 巨幅提高 IoU 权重
  # --------------------------------------
  
  coord_loss_weight: 5.0    # <<< 降低离散坐标权重
  reg_loss_weight: 10.0       # <<< 大幅提高回归损失权重
  cls_loss_weight: 10.0
  count_loss_weight: 10.0   # <<< 降低计数损失权重
  area_loss_weight: 10.0    # <<< 提高面积损失权重
  # Inference
  max_elements: 30
  # Data paths
  xlsx_path: "/home/610-sty/Layout2Paint/dataset/6800poems.xlsx"
  images_dir: "/home/610-sty/Layout2Paint/dataset/6800"
  labels_dir: "/home/610-sty/Layout2Paint/dataset/6800/JPEGImages-pre_new_txt"
  max_layout_length: 30
  max_text_length: 64

training:
  batch_size: 16
  epochs: 400
  learning_rate: 0.0001
  warmup_steps: 1000
  save_every: 50
  output_dir: "./outputs"
  log_steps: 10

inference:
  max_output_length: 30
  # beam_size: 1